<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Entrar — StreamHub</title>
<meta name="description" content="Acesse sua conta StreamHub.">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>
<header class="navbar">
  <div class="nav-inner">
    <a href="index.html" class="brand"></span><span class="brand-name">StreamHub</span></a>
    <nav class="nav-links" style="margin-left:auto;">
      <a class="nav-link" href="index.html">Início</a>
      <a class="btn btn-ghost" href="cadastro.html">Criar conta</a>
    </nav>
  </div>
</header>

<main id="main" class="auth-wrap">
  <div class="auth-card">
    <h1>Bem-vindo de volta</h1>
    <p class="sub">Entre na sua conta para continuar acompanhando seus criadores favoritos.</p>

    <form id="form-login" novalidate>
      <div class="field">
        <label for="email">E-mail</label>
        <input id="email" name="email" type="email" required autocomplete="email" placeholder="voce@exemplo.com">
      </div>
      <div class="field">
        <label for="password">Senha</label>
        <input id="password" name="password" type="password" required autocomplete="current-password" placeholder="••••••••">
        <div class="hint">Mínimo de 6 caracteres.</div>
      </div>
      <div id="login-error" class="error" role="alert" aria-live="polite"></div>
      <button type="submit" class="btn btn-primary btn-block" style="margin-top:8px;">Entrar</button>
    </form>

    <p class="auth-foot">Ainda não tem conta? <a href="cadastro.html">Cadastre-se</a></p>
  </div>
</main>

<script src="assets/js/storage.js"></script>
<script src="assets/js/main.js"></script>
<script src="assets/js/auth.js"></script>
</body>
</html>
