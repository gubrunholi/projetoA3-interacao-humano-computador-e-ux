<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Criar conta — StreamHub</title>
<meta name="description" content="Crie sua conta StreamHub gratuitamente.">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>
<header class="navbar">
  <div class="nav-inner">
    <a href="index.html" class="brand"></span><span class="brand-name">StreamHub</span></a>
    <nav class="nav-links" style="margin-left:auto;">
      <a class="nav-link" href="index.html">Início</a>
      <a class="btn btn-ghost" href="login.html">Já tenho conta</a>
    </nav>
  </div>
</header>

<main id="main" class="auth-wrap">
  <div class="auth-card">
    <h1>Crie sua conta</h1>
    <p class="sub">Junte-se à comunidade StreamHub em menos de 1 minuto.</p>

    <form id="form-cadastro" novalidate>
      <div class="field">
        <label for="name">Nome</label>
        <input id="name" name="name" type="text" required autocomplete="name" placeholder="Como devemos te chamar?">
      </div>
      <div class="field">
        <label for="email">E-mail</label>
        <input id="email" name="email" type="email" required autocomplete="email" placeholder="voce@exemplo.com">
      </div>
      <div class="field">
        <label for="password">Senha</label>
        <input id="password" name="password" type="password" required autocomplete="new-password" placeholder="Mínimo 6 caracteres">
        <div class="hint">Use uma senha forte com letras e números.</div>
      </div>
      <div id="cad-error" class="error" role="alert" aria-live="polite"></div>
      <button type="submit" class="btn btn-primary btn-block" style="margin-top:8px;">Criar conta</button>
    </form>

    <p class="auth-foot">Já tem conta? <a href="login.html">Entrar</a></p>
  </div>
</main>

<script src="assets/js/storage.js"></script>
<script src="assets/js/main.js"></script>
<script src="assets/js/auth.js"></script>
</body>
</html>
